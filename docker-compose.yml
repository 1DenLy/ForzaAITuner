x-db-healthcheck: &db-healthcheck
  test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d forza_data" ]
  interval: 10s
  timeout: 5s
  retries: 5

services:
  # ------------------------------------------------
  # Container: db (PostgreSQL 17)
  # Роль: Основная реляционная база.
  # Хранит сущности API: пользователи, настройки, результаты тюнинга.
  # ------------------------------------------------
  db:
    image: postgres:17
    container_name: db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepass}
      POSTGRES_DB: forza_data
    volumes:
      - pg_main_data:/var/lib/postgresql/data
    networks:
      - forza_net
    healthcheck: *db-healthcheck

  # ------------------------------------------------
  # Container: timescale_db (TimescaleDB + PostgreSQL 17)
  # Роль: База для временных рядов.
  # Хранит: потоковую телеметрию.
  # ------------------------------------------------
  timescale_db:
    image: timescale/timescaledb:latest-pg17
    container_name: timescale_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepass}
      POSTGRES_DB: forza_data
      # Опциональные настройки для утилиты timescaledb-tune
      TS_TUNE_MEMORY: "512MB"
      TS_TUNE_NUM_CPUS: "2"
    volumes:
      - pg_timescale_data:/var/lib/postgresql/data
    networks:
      - forza_net
    healthcheck: *db-healthcheck
    # ТЮНИНГ ПРОИЗВОДИТЕЛЬНОСТИ
    command: >
      postgres  -c synchronous_commit=off  -c max_wal_size=1GB  -c shared_buffers=512MB  -c work_mem=16MB

  # ------------------------------------------------
  # Container: forza_admin (pgAdmin4)
  # ------------------------------------------------
  forza_admin:
    image: dpage/pgadmin4:latest
    container_name: forza_admin
    restart: always
    depends_on:
      db:
        condition: service_healthy
      timescale_db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${ADMIN_EMAIL:-admin@fh.local}
      PGADMIN_DEFAULT_PASSWORD: ${ADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    networks:
      - forza_net

  # ------------------------------------------------
  # Container: forza_core (Ingestion Engine)
  # Роль: Прием UDP пакетов, парсинг и запись в TimescaleDB.
  # ------------------------------------------------
  forza_core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: forza_core
    restart: always
    depends_on:
      timescale_db:
        condition: service_healthy
      db:
        condition: service_healthy
    command: python -m src.backend.main
    ports:
      - "5300:5300/udp"
      - "8001:8000"
    environment:
      # Основное подключение (для телеметрии) к TimescaleDB
      DB_HOST: timescale_db
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-securepass}
      DB_NAME: forza_data
      # Подключение к основной БД (если требуется для метаданных)
      MAIN_DB_HOST: db
      MAIN_DB_PORT: 5432
      UDP_PORT: 5300
    networks:
      - forza_net
    sysctls:
      - net.core.rmem_max=26214400

  # ------------------------------------------------
  # Container: backend (Analytics Engine)
  # Роль: Пост-обработка данных, расчет статистики.
  # Бывший forza_processor.
  # ------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      timescale_db:
        condition: service_healthy
    command: python -m src.backend.main
    environment:
      # Подключение к основной БД (Entities)
      DB_HOST: db
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-securepass}
      DB_NAME: forza_data
      # Подключение к TimescaleDB (Telemetry)
      TIMESCALE_HOST: timescale_db
      TIMESCALE_PORT: 5432
      TIMESCALE_DB: forza_data
    networks:
      - forza_net

volumes:
  pg_main_data: # Хранилище для основной БД (Postgres)
  pg_timescale_data:
    # Хранилище для TimescaleDB

networks:
  forza_net:
    driver: bridge
